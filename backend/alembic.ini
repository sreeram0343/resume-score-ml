# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to clone to slug of a new revision
# truncate_slug_length = 40

# set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# set to 'true' to allow empty/non-existent migrations to run
# version_locations = %(here)s/bar

# version path separator; defaults to os.pathpathsep.
# version_path_separator = :

# set to 'true' to enable searching for revision files recursively
# recursive_version_locations = false

# the output encoding used when writing new migration files
# output_encoding = utf-8

# This is overridden dynamically in env.py from settings.database_url
sqlalchemy.url = postgresql://user:password@localhost:5432/resume_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
